<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[85vh] border border-gray-100">
        
        <div class="pt-6 pb-4 px-6 flex flex-col items-center relative border-b border-gray-50 bg-white sticky top-0 z-10">
            <div class="w-full flex justify-between items-center absolute top-6 px-6 text-gray-600">
                <button class="hover:text-gray-900 cursor-pointer text-xl"><i class="fa-solid fa-bars"></i></button>
                <button class="hover:text-gray-900 cursor-pointer text-xl"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
            
            <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Felix" alt="AI Avatar" class="w-20 h-20 rounded-full bg-blue-100 p-1 object-cover">
            <h1 class="text-xl font-bold text-slate-800 mt-2">AI Assistant</h1>
            <p class="text-xs text-gray-400 font-medium">Always here to help you!</p>
        </div>

        <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/50">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500 text-sm">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="max-w-[75%]">
                    <div class="bg-white text-slate-700 text-sm px-4 py-3 rounded-2xl rounded-tl-none shadow-xs border border-gray-100">
                        Hello! 👋 <br> How can I help you today?
                    </div>
                    <span class="text-[10px] text-gray-400 ml-1 mt-1 block">08:30 AM</span>
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex items-center gap-2 bg-gray-50 rounded-full px-4 py-2 border border-gray-200">
                <button class="text-gray-400 hover:text-gray-600 text-lg cursor-pointer">
                    <i class="fa-regular fa-face-smile"></i>
                </button>
                <input id="user-input" type="text" placeholder="Type a message..." class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700 placeholder-gray-400 py-1">
                <button id="send-btn" class="bg-indigo-500 hover:bg-indigo-600 text-white rounded-full px-4 py-1.5 text-sm font-medium flex items-center gap-1 transition cursor-pointer">
                    <span>Send</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 🔥 APNA RENDER URL YAHAN APNE APP NAME KE SATH BADLO 🔥
        // Screenshot me jo aapka unique onrender URL dikh raha tha, use yahan daalein
        const BACKEND_URL = "https://chatbot-back-5.onrender.com/send_message"; 

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            return `${hours}:${minutes} ${ampm}`;
        }

        function appendMessage(text, isUser) {
            const time = getCurrentTime();
            let msgHTML = '';

            if (isUser) {
                msgHTML = `
                    <div class="flex items-start justify-end gap-3">
                        <div class="max-w-[75%] flex flex-col items-end">
                            <div class="bg-indigo-400 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-none shadow-xs">
                                ${text}
                            </div>
                            <span class="text-[10px] text-gray-400 mr-1 mt-1 block">
                                ${time} <i class="fa-solid fa-check-double text-indigo-400 ml-0.5"></i>
                            </span>
                        </div>
                    </div>
                `;
            } else {
                msgHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500 text-sm">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <div class="max-w-[75%]">
                            <div class="bg-white text-slate-700 text-sm px-4 py-3 rounded-2xl rounded-tl-none shadow-xs border border-gray-100">
                                ${text}
                            </div>
                            <span class="text-[10px] text-gray-400 ml-1 mt-1 block">${time}</span>
                        </div>
                    </div>
                `;
            }

            chatBox.insertAdjacentHTML('beforeend', msgHTML);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. User Message UI par dikhayein
            appendMessage(message, true);
            userInput.value = '';

            // 2. Temporary Loading text dikhayein
            appendMessage("Thinking...", false);
            const lastMessageBubble = chatBox.lastElementChild.querySelector('.bg-white');

            // 3. Flask Backend URL par POST request bhejiyen
            fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ message: message })
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! Status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                // Backend se aaye reply ko "Thinking..." ki jagah update karein
                lastMessageBubble.innerText = data.reply;
            })
            .catch(err => {
                console.error("Error details:", err);
                lastMessageBubble.innerText = "Error: Server response nahi de raha.";
            });
        }

        // Click aur Enter key triggers
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
